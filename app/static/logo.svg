<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Left card: cyan gradient -->
    <linearGradient id="g-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00cfc2"/>
      <stop offset="100%" stop-color="#00b8ad"/>
    </linearGradient>
    <!-- Middle card: teal→emerald vertical gradient -->
    <linearGradient id="g-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#007d6a"/>
      <stop offset="100%" stop-color="#00a860"/>
    </linearGradient>
    <!-- Right card: emerald→lime vertical gradient -->
    <linearGradient id="g-right" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#00c860"/>
      <stop offset="100%" stop-color="#4cff7e"/>
    </linearGradient>
  </defs>

  <!-- Dark navy background -->
  <rect width="512" height="512" fill="#091c2d"/>

  <!-- LEFT card: tall, narrow, solid cyan — rendered first (bottom layer) -->
  <rect x="96" y="73" width="112" height="340" rx="20" fill="url(#g-left)"/>

  <!-- MIDDLE card: teal-green, semi-transparent frosted glass look -->
  <rect x="150" y="112" width="144" height="284" rx="24"
        fill="url(#g-mid)" fill-opacity="0.82"/>
  <rect x="150" y="112" width="144" height="284" rx="24"
        fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

  <!-- RIGHT card: bright lime-green gradient, topmost layer -->
  <rect x="253" y="146" width="164" height="222" rx="30"
        fill="url(#g-right)" fill-opacity="0.92"/>
  <rect x="253" y="146" width="164" height="222" rx="30"
        fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
</svg>
