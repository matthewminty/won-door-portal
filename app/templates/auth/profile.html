{% extends "layouts/base.html" %}
{% block title %}Profile · Won-Door Portal{% endblock %}
{% block content %}
<div style="max-width:600px;margin:0 auto">
  <div class="page-header"><div><div class="page-label">Settings</div><div class="page-title">Profile</div></div></div>

  <div class="card" style="margin-bottom:16px">
    <div class="card-head"><div class="card-title">Account Details</div></div>
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="action" value="update_profile">
        <div class="form-group">
          <label>Display Name</label>
          <input type="text" name="display_name" class="form-input" value="{{ current_user.display_name }}">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" class="form-input" value="{{ current_user.email or '' }}">
        </div>
        <div class="form-group">
          <label>Default Region</label>
          <select name="default_region" class="form-input" style="cursor:pointer">
            <option value="au" {{ 'selected' if current_user.default_region == 'au' }}>Australia (AU)</option>
            <option value="nz" {{ 'selected' if current_user.default_region == 'nz' }}>New Zealand (NZ)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Theme</label>
          <select name="theme" class="form-input" style="cursor:pointer">
            <option value="light" {{ 'selected' if current_user.theme == 'light' }}>Light</option>
            <option value="dark" {{ 'selected' if current_user.theme == 'dark' }}>Dark</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><div class="card-title">Change Password</div></div>
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="action" value="change_password">
        <div class="form-group">
          <label>Current Password</label>
          <input type="password" name="current_password" class="form-input" required>
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" name="new_password" class="form-input" required minlength="8">
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" name="confirm_password" class="form-input" required>
        </div>
        <button type="submit" class="btn btn-primary">Update Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
