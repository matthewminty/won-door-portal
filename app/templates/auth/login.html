<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · Won-Door Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/portal.css') }}">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh">

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
    <div class="toast show {{ category }}" onclick="this.classList.remove('show')">{{ message }}</div>
    {% endfor %}
  {% endif %}
{% endwith %}

<div class="form-card card" style="width:100%">
  <div style="padding:28px 24px 0;text-align:center">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:var(--accent)">WON-DOOR</div>
    <div style="font-size:11px;font-weight:500;color:var(--text-3);letter-spacing:2px;text-transform:uppercase;margin-top:2px">Portal</div>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-input" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;height:42px;font-size:14px;justify-content:center;margin-top:8px">Log in</button>
    </form>
  </div>
  <div style="border-top:1px solid var(--border);padding:14px 24px 18px;background:var(--bg-2,#f8f8f8);border-radius:0 0 10px 10px">
    <div style="font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-3);margin-bottom:8px">Test Credentials</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
      <div style="background:var(--bg,#fff);border:1px solid var(--border);border-radius:6px;padding:8px 10px;cursor:pointer" onclick="fillLogin('matt','changeme123')">
        <div style="font-size:11px;font-weight:600;color:var(--text-1,#111)">matt</div>
        <div style="font-size:10px;color:var(--text-3);margin-top:1px">Admin · AU</div>
      </div>
      <div style="background:var(--bg,#fff);border:1px solid var(--border);border-radius:6px;padding:8px 10px;cursor:pointer" onclick="fillLogin('partner','changeme123')">
        <div style="font-size:11px;font-weight:600;color:var(--text-1,#111)">partner</div>
        <div style="font-size:10px;color:var(--text-3);margin-top:1px">Standard · NZ</div>
      </div>
    </div>
    <div style="font-size:10px;color:var(--text-3);margin-top:8px">Click a card to fill in — password is <code style="font-size:10px">changeme123</code></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('.toast.show').forEach(function(t){
    setTimeout(function(){t.classList.remove('show')},4000);
  });
});
function fillLogin(u,p){
  document.getElementById('username').value=u;
  document.getElementById('password').value=p;
  document.getElementById('username').focus();
}
</script>
</body>
</html>
