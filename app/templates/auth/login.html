<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · Won-Door Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/portal.css') }}">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh">

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
    <div class="toast show {{ category }}" onclick="this.classList.remove('show')">{{ message }}</div>
    {% endfor %}
  {% endif %}
{% endwith %}

<div class="form-card card" style="width:100%">
  <div style="padding:28px 24px 0;text-align:center">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:var(--accent)">WON-DOOR</div>
    <div style="font-size:11px;font-weight:500;color:var(--text-3);letter-spacing:2px;text-transform:uppercase;margin-top:2px">Portal</div>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-input" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;height:42px;font-size:14px;justify-content:center;margin-top:8px">Log in</button>
    </form>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('.toast.show').forEach(function(t){
    setTimeout(function(){t.classList.remove('show')},4000);
  });
});
</script>
</body>
</html>
